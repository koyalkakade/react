<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Festival Web PosterS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./styles.css">
</head>

<body>
    <div class="container-flud">
        <header class="text-bg-danger">
            <i class="fa-solid fa-music" style="color: rgb(255, 212, 59);"></i>
            <h4>Electric Vibe Music Festival 2025</h4>
            <i class="fa-solid fa-music" style="color: rgb(255, 212, 59);"></i>
        </header>
        <div class="row d-flex p-5 clsLineup">
            <div class="col-6 col-md-2">
                <div class="border border-danger clsSpan"><span class="text-light">DJ Nova</span></div>
            </div>
            <div class="col-6 col-md-2">
                <div class="border border-danger clsSpan"><span class="text-light">Electric Beats</span></div>
            </div>
            <div class="col-6 col-md-2">
                <div class="border border-danger clsSpan"><span class="text-light">SynthStorm</span></div>
            </div>
            <div class="col-6 col-md-2">
                <div class="border border-danger clsSpan"><span class="text-light">Lunar Bass</span></div>
            </div>
            <div class="col-6 col-md-2">
                <div class="border border-danger clsSpan"><span class="text-light">GlowRiders</span></div>
            </div>
        </div>

        <div class="row">
            <div class="col-12 col-md-4 d-flex justify-content-center">
                <div class="card text-center">
                    <h3>Standard</h3>
                    <p> <i class="fa-solid fa-dollar-sign"></i> 49</p>
                    <button type="button" class="btn btn-danger">Buy Now </button>
                </div>
            </div>
            <div class="col-12 col-md-4 d-flex justify-content-center">
                <div class="card text-center">
                    <h3>VIP</h3>
                    <p> <i class="fa-solid fa-dollar-sign"></i>99 </p>
                    <button type="button" class="btn btn-danger">Buy Now </button>
                </div>
            </div>
            <div class="col-12 col-md-4 d-flex justify-content-center">
                <div class="card text-center">
                    <h3>Backstage</h3>
                    <p><i class="fa-solid fa-dollar-sign"></i>149</p>
                    <button type="button" class="btn btn-danger">Live Now </button>
                </div>
            </div>
        </div>

        <div class="row m-5">
            <div class="col-12 clsfood">
                <p><i class="fa-solid fa-sort-down"></i><b>No Outside Food</b></p>
                <p>Please refrain from bringing outside food or beverages to ensure safety and hygiene.</p>
            </div>
            <div class="col-12 clsfood">
                <span><i class="fa-solid fa-caret-right"></i><b>Re-entery Policy</b></span>
            </div>
            <div class="col-12 clsfood">
                <span><i class="fa-solid fa-caret-right"></i><b>Photography</b></span>
            </div>
        </div>
    </div>



    <!-- script -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
